<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>  
<body>
  <div class="calculator">
    <!-- Display -->
    <div class="display">
      <div class="history" id="history"></div>
      <div class="current" id="current">0</div>
    </div>

    <!-- Memory Row -->
    <div class="btn-grid memory-row">
      <button class="btn mem" data-action="mc">MC</button>
      <button class="btn mem" data-action="mr">MR</button>
      <button class="btn mem" data-action="m-plus">M+</button>
      <button class="btn mem" data-action="m-minus">M−</button>
    </div>

    <!-- Scientific toggle -->
    <button class="toggle-sci" id="toggleSci">𝑓(𝑥) Scientific ▾</button>

    <!-- Scientific Panel -->
    <div class="sci-panel" id="sciPanel">
      <!-- Trig row -->
      <div class="btn-grid sci-grid">
        <button class="btn sci" data-action="sin">sin</button>
        <button class="btn sci" data-action="cos">cos</button>
        <button class="btn sci" data-action="tan">tan</button>
        <button class="btn sci" data-action="ln">ln</button>
      </div>
      <!-- Inverse trig row -->
      <div class="btn-grid sci-grid">
        <button class="btn sci" data-action="asin">sin⁻¹</button>
        <button class="btn sci" data-action="acos">cos⁻¹</button>
        <button class="btn sci" data-action="atan">tan⁻¹</button>
        <button class="btn sci" data-action="log10">log</button>
      </div>
      <!-- Hyperbolic row -->
      <div class="btn-grid sci-grid">
        <button class="btn sci hyp" data-action="sinh">sinh</button>
        <button class="btn sci hyp" data-action="cosh">cosh</button>
        <button class="btn sci hyp" data-action="tanh">tanh</button>
        <button class="btn sci" data-action="log10">log</button>
      </div>
      <!-- Inverse hyperbolic row -->
      <div class="btn-grid sci-grid">
        <button class="btn sci hyp" data-action="asinh">sinh⁻¹</button>
        <button class="btn sci hyp" data-action="acosh">cosh⁻¹</button>
        <button class="btn sci hyp" data-action="atanh">tanh⁻¹</button>
        <button class="btn sci" data-action="ln">ln</button>
      </div>
      <!-- Mode toggle -->
      <div class="angle-row">
        <span class="angle-label">Angle:</span>
        <button class="angle-btn active" id="btnDeg">DEG</button>
        <button class="angle-btn" id="btnRad">RAD</button>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-grid">
      <button class="btn fn" data-action="clear">C</button>
      <button class="btn fn" data-action="ce">CE</button>
      <button class="btn fn" data-action="backspace">⌫</button>
      <button class="btn op" data-action="divide">÷</button>

      <button class="btn fn" data-action="sqrt">√</button>
      <button class="btn fn" data-action="square">x²</button>
      <button class="btn fn" data-action="percent">%</button>
      <button class="btn op" data-action="multiply">×</button>

      <button class="btn num" data-value="7">7</button>
      <button class="btn num" data-value="8">8</button>
      <button class="btn num" data-value="9">9</button>
      <button class="btn op" data-action="subtract">−</button>

      <button class="btn num" data-value="4">4</button>
      <button class="btn num" data-value="5">5</button>
      <button class="btn num" data-value="6">6</button>
      <button class="btn op" data-action="add">+</button>

      <button class="btn num" data-value="1">1</button>
      <button class="btn num" data-value="2">2</button>
      <button class="btn num" data-value="3">3</button>
      <button class="btn eq" data-action="equals" rowspan="2">=</button>

      <button class="btn num zero" data-value="0">0</button>
      <button class="btn num" data-value=".">.</button>
      <button class="btn fn" data-action="negate">+/−</button>
    </div>

    <!-- History Panel -->
    <div class="history-panel" id="historyPanel">
      <div class="history-header">
        <span>History</span>
        <button id="clearHistory">Clear</button>
      </div>
      <ul id="historyList"></ul>
    </div>
    <button class="toggle-history" id="toggleHistory">🕘 History</button>
  </div>

  <script src="script.js?v=8"></script>
</body>
</html>
